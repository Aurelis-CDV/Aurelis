<div class="window-border">
  <div class="window-wrapper">
    <div class="top-bar">
      @if (showRefresh()) {
        <button
          type="button"
          class="icon-wrapper refresh"
          [disabled]="refreshDisabled()"
          [attr.aria-busy]="refreshDisabled()"
          aria-label="Reload greenhouse data"
          (click)="onRefresh()"
        >
          <aurelis-refresh-icon></aurelis-refresh-icon>
        </button>
      }
      <div class="icon-wrapper close" (click)="onClose()">
        <aurelis-close></aurelis-close>
      </div>
    </div>
    <div class="window-content">
      <ng-content></ng-content>
    </div>
  </div>
</div>
