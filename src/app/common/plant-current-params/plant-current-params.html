<div class="left-side">
  <div class="plant-params">
    <div class="soil-moisture-wrapper param-wrapper">
      <div class="icon-wrapper">
        <aurelis-water-drop></aurelis-water-drop>
      </div>
      <div class="soil-moisture-value-wrapper">
        <p>{{ plant.soil_moisture }}%</p>
      </div>
    </div>
    <div class="general-condition-wrapper param-wrapper">
      <div class="icon-wrapper">
        <aurelis-plant-general-condition
          [condition]="plant.condition"
        ></aurelis-plant-general-condition>
      </div>
      <div class="condition-value-wrapper">
        <p>{{ getPlantConditionDescription(plant.condition) }}</p>
      </div>
    </div>
  </div>
</div>
