<div class="custom-select" [class.custom-select--disabled]="disabled">
  @if (label) {
    <label class="custom-select__label">
      {{ label }}
    </label>
  }

  <button
    type="button"
    class="custom-select__trigger"
    [class.custom-select__trigger--placeholder]="!selectedOption"
    [attr.aria-expanded]="isOpen"
    [attr.aria-disabled]="disabled"
    [disabled]="disabled"
    role="combobox"
    aria-haspopup="listbox"
    (click)="toggle()"
    (blur)="onButtonBlur()"
  >
    <span class="custom-select__trigger-text">{{ displayText }}</span>
    <span class="custom-select__icon" aria-hidden="true"></span>
  </button>

  @if (isOpen) {
    <ul class="custom-select__menu" role="listbox">
      @for (option of options; track option; let i = $index) {
        <li
          class="custom-select__option"
          [class.custom-select__option--selected]="option.value === value"
          [class.custom-select__option--active]="isOptionActive(i)"
          [class.custom-select__option--disabled]="option.disabled"
          role="option"
          [attr.aria-selected]="option.value === value"
          [attr.aria-disabled]="option.disabled"
          (click)="selectOption(option)"
        >
          {{ option.label }}
        </li>
      }
    </ul>
  }
</div>
