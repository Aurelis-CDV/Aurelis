<div
  class="delete-button-wrapper"
  (click)="confirmDeletePlant($event)"
  [class.disabled]="isDeleting()"
  [attr.aria-disabled]="isDeleting()"
  role="button"
  tabindex="0"
  aria-label="Delete plant"
>
  <aurelis-trash></aurelis-trash>
</div>
<div class="watering-button-wrapper" (click)="openWateringNote($event)">
  <aurelis-water-drop></aurelis-water-drop>
</div>
<div class="maximize-button-wrapper" (click)="showPlantDetailsWindow()">
  <aurelis-maximize></aurelis-maximize>
</div>
