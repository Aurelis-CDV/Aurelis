@for (plant of plants; track plant.id) {
  <div class="plant-preview-wrapper">
    <div class="plant-preview-top-bar">
      <div class="plant-name-wrapper">
        <p>{{ plant.name }}</p>
      </div>
      <div class="plant-preview-image-wrapper">
        <img src="{{ plant.preview_url }}" alt="Plant preview" />
      </div>
    </div>
    <div class="plant-preview-params-wrapper">
      <div class="left-side">
        <div class="plant-params">
          <div class="soil-moisture-wrapper param-wrapper">
            <div class="icon-wrapper">
              <aurelis-water-drop></aurelis-water-drop>
            </div>
            <div class="soil-moisture-value-wrapper">
              <p>{{ plant.value }}%</p>
            </div>
          </div>
          <div class="general-condition-wrapper param-wrapper">
            <div class="icon-wrapper">
              <aurelis-plant-general-condition
                [condition]="plant.condition"
              ></aurelis-plant-general-condition>
            </div>
            <div class="condition-value-wrapper">
              <p>{{ getPlantConditionDescription(plant.condition) }}</p>
            </div>
          </div>
        </div>
      </div>
      <div class="right-side">
        <div class="chart-wrapper">
          <canvas id="plant-preview-chart-{{ plant.id }}"
            >{{plantPreviewChartsByPlantId[plant.id]}</canvas
          >
        </div>
      </div>
    </div>
  </div>
}
