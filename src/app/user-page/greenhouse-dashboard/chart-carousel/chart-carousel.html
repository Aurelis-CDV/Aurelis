<aurelis-carousel>
  @for (param of chartParams(); track param.name) {
    <div class="param-wrapper">
      <div class="chart-title-wrapper">
        <p class="chart-title">{{ getParamName(param.name) }}</p>
      </div>
      <div class="chart-wrapper">
        <canvas id="param-chart-{{ param.name }}"></canvas>
      </div>
    </div>
  }
</aurelis-carousel>
