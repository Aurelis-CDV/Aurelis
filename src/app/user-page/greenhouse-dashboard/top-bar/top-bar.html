<div class="left-side">
  <div class="greenhouse-name-wrapper">
    <p>{{ greenhouseData()?.name }}</p>
  </div>
</div>
<div class="right-side">
  <div class="buttons-wrapper">
    <button
      type="button"
      class="button-wrapper"
      [disabled]="isReloadingGreenhouseData()"
      [attr.aria-busy]="isReloadingGreenhouseData()"
      aria-label="Reload greenhouse data"
      (click)="reloadGreenhouseData()"
    >
      <aurelis-refresh-icon></aurelis-refresh-icon>
    </button>
    <div class="button-wrapper" (click)="openGreenhouseSettings()" aria-label="Greenhouse settings">
      <aurelis-settings-icon></aurelis-settings-icon>
    </div>
  </div>
</div>
