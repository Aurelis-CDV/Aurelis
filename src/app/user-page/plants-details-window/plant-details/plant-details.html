@if (wateringNotePopupOpen()) {
  <aurelis-plant-watering-note-popup
    [plant]="plant"
    [greenhouseId]="dashboardGreenhouseId()"
    (closed)="closeWateringNotePopup()"
  ></aurelis-plant-watering-note-popup>
}

@if (removeWateringDayPopupDay(); as dayToRemove) {
  <aurelis-plant-watering-remove-day-popup
    [plant]="plant"
    [greenhouseId]="dashboardGreenhouseId()"
    [calendarDay]="dayToRemove"
    (closed)="closeRemoveWateringDayPopup()"
  ></aurelis-plant-watering-remove-day-popup>
}

<div class="plant-summary">
  <div class="plant-summary-details">
    <div class="plant-edit-wrapper">
      <div class="plant-preview-image-wrapper">
        <img src="{{ plant.preview_url }}" alt="" />
      </div>
      <div class="plant-name-wrapper">
        <p>{{ plant.name }}</p>
      </div>
      <div class="button-wrapper plant-settings" (click)="openPlantSettings()" aria-label="Plant settings">
        <aurelis-settings-icon></aurelis-settings-icon>
      </div>
    </div>
    <div class="plant-params-wrapper">
      <aurelis-plant-current-params
        [plant]="plant"
        [greenhouseTemperatureC]="greenhouseClimate().temperatureC"
        [greenhouseAirHumidityPercent]="greenhouseClimate().airHumidityPercent"
      ></aurelis-plant-current-params>
    </div>
    <div class="plant-actions">
      <button type="button" class="note-watering-button" (click)="openWateringNotePopup()">
        Note watering
      </button>
    </div>
  </div>
  <div class="plant-summary-calendar">
    <aurelis-calendar
      [highlightedDays]="plant.watering_history"
      (wateringHighlightedDaySelected)="openRemoveWateringDayPopup($event)"
    ></aurelis-calendar>
  </div>
</div>

<div class="filtered-details-wrapper">
  <div class="dropdown-wrapper">
    <aurelis-select
      [options]="chartRangeOptions"
      [ngModel]="chartRangeKey()"
      (ngModelChange)="onChartRangeKeyChange($event)"
    ></aurelis-select>
  </div>
  @if (chartLoadError(); as err) {
    <p class="chart-load-error" role="alert">{{ err }}</p>
  }
  <div class="chart-wrapper">
    <canvas id="plant-soil-moisture-{{ plant.id }}"></canvas>
  </div>
</div>
