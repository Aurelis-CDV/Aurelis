<div class="top-bar">
  <div class="left">
    <div class="plant-preview-image-wrapper">
      <img src="{{ plant.preview_url }}" />
    </div>
    <div class="plant-name-wrapper">
      <p>{{ plant.name }}</p>
    </div>
  </div>
  <div class="right">
    <aurelis-calendar [highlightedDays]="plant.watering_history"></aurelis-calendar>
  </div>
</div>
<div class="filtered-details-wrapper">
  <div class="dropdown-wrapper">
    <aurelis-chart-dropdown
      class="filter-dropdown"
      [options]="filterOptions"
      [selectedValue]="selectedFilterRange"
      ariaLabel="Soil moisture history range"
      (selectedValueChange)="onFilterChange($event)"
    ></aurelis-chart-dropdown>
  </div>
  <div class="chart-wrapper">
    <canvas id="plant-soil-moisture-{{ plant.id }}"></canvas>
  </div>
</div>
