<aurelis-popup-window
  [showRefresh]="true"
  [refreshDisabled]="greenhousesDataService.isLoading()"
  (closeWindow)="hidePlantDetailsWindow()"
  (refreshClick)="reloadGreenhouseDataFromDetails()"
>
  <aurelis-carousel
    [currentIndex]="plantDetailsCarouselInitialIndex()"
    [layoutRevision]="plantDetailsCarouselLayoutRevision()"
  >
    @for (plant of greenhouseData()?.plants; track plant.id) {
      <aurelis-plant-details [plant]="plant"></aurelis-plant-details>
    }
  </aurelis-carousel>
</aurelis-popup-window>
