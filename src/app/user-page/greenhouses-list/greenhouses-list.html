<div
  class="greenhouses-list-wrapper"
  (mouseenter)="toggleGreenhousesPreviewNames()"
  (mouseleave)="toggleGreenhousesPreviewNames()"
>
  @for (greenhouse of greenhouses(); track greenhouse.id) {
    <div class="greenhouse-preview-wrapper">
      <img src="{{ greenhouse.preview_url }}" alt="Greenhouse preview" />
      @if (showGreenhousesPreviewNames) {
        <div class="greenhouse-name-wrapper">
          <p>{{ greenhouse.name }}</p>
        </div>
      }
    </div>
  }
</div>
